<!DOCTYPE html>
<html lang='en'>
<head>
	<meta charset='UTF-8'>
	<title>Webcam JPEG Streamer</title>
	<style>
		body {
			font-family: sans-serif;
			color: #303438;
			text-align: center;
			max-width: 900px;
			margin: 0 auto;
			padding: 20px;
		}
		h1 {
			color: #1976D2;
		}
		.container {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
			margin: 20px 0;
		}
		.section {
			border: 1px solid #ccc;
			padding: 15px;
			border-radius: 8px;
			background-color: #f9f9f9;
		}
		video, canvas {
			max-width: 100%;
			border: 1px solid #ccc;
			border-radius: 4px;
			margin: 10px 0;
		}
		canvas {
			display: none;
		}
		button {
			background-color: #1976D2;
			color: white;
			border: none;
			padding: 10px 20px;
			border-radius: 4px;
			cursor: pointer;
			font-size: 16px;
			margin: 10px 5px;
		}
		button:hover {
			background-color: #1565C0;
		}
		button:disabled {
			background-color: #ccc;
			cursor: not-allowed;
		}
		#status {
			padding: 10px;
			margin: 10px 0;
			border-radius: 4px;
			font-weight: bold;
		}
		#status.connected {
			background-color: #c8e6c9;
			color: #2e7d32;
		}
		#status.disconnected {
			background-color: #ffcdd2;
			color: #c62828;
		}
		#status.streaming {
			background-color: #bbdefb;
			color: #1565C0;
		}
		#stats {
			text-align: left;
			font-size: 12px;
			background-color: #f0f0f0;
			padding: 10px;
			border-radius: 4px;
			margin: 10px 0;
			font-family: monospace;
		}
		.stat-line {
			margin: 5px 0;
		}
	</style>
</head>
<body>
	<h1>🎥 Webcam JPEG Streamer</h1>
	
	<div id="connectionStatus" style="text-align: center; margin: 20px 0; padding: 10px; background-color: #fff3cd; border-radius: 4px;">
		<strong>Initializing...</strong>
	</div>
	
	<div class="container">
		<div class="section">
			<h2>Webcam</h2>
			<video id="video" width="320" height="240" playsinline autoplay muted></video>
			<canvas id="canvas" width="320" height="240"></canvas>
			<div id="status" class="disconnected">Not Connected</div>
			<div>
				<button id="startButton">Start Camera</button>
				<button id="stopButton" disabled>Stop Camera</button>
				<button id="fullscreenBtn" disabled>⛶ Fullscreen</button>
				<button id="pipBtn" disabled>🖼 Picture-in-Picture</button>
			</div>
		</div>
		
		<div class="section">
			<h2>Streaming</h2>
			<div>
				<label for="frameRate">Frame Rate (FPS):</label>
				<input type="number" id="frameRate" min="1" max="30" value="5" style="width: 60px;">
				<button id="startStream" disabled>Start Stream</button>
				<button id="stopStream" disabled>Stop Stream</button>
			</div>
			<div id="stats">
				<div class="stat-line">Frames sent: <span id="frameCount">0</span></div>
				<div class="stat-line">Bytes sent: <span id="byteCount">0</span></div>
				<div class="stat-line">Avg frame size: <span id="avgSize">0</span> KB</div>
				<div class="stat-line">Connection: <span id="connectionStatus">Disconnected</span></div>
			</div>
		</div>
	</div>

	<script>
	const video = document.getElementById('video');
	const canvas = document.getElementById('canvas');
	const ctx = canvas.getContext('2d');
	const statusDiv = document.getElementById('status');
	const connectionStatusDiv = document.getElementById('connectionStatus');
	const startButton = document.getElementById('startButton');
	const stopButton = document.getElementById('stopButton');
	const startStreamButton = document.getElementById('startStream');
	const stopStreamButton = document.getElementById('stopStream');
	const frameRateInput = document.getElementById('frameRate');
	
	let stream = null;
	let streaming = false;
	let ws = null;
	let frameCount = 0;
	let byteCount = 0;
	let streamInterval = null;
	
	// Auth token stored in memory only (session-based)
	let authToken = null;
	
	// Load saved FPS from localStorage (non-sensitive preference)
	const savedFPS = localStorage.getItem('webcam-fps');
	if (savedFPS) {
		frameRateInput.value = savedFPS;
	}
	
	// Save FPS to localStorage when it changes
	frameRateInput.addEventListener('change', function() {
		localStorage.setItem('webcam-fps', this.value);
	});
	frameRateInput.addEventListener('input', function() {
		localStorage.setItem('webcam-fps', this.value);
	});
	
	// Connect to WebSocket
	function connectWebSocket(token) {
		const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
		let wsUrl = protocol + '//' + location.host + '/server';
		if (token) {
			wsUrl += '?token=' + encodeURIComponent(token);
		}
		
		ws = new WebSocket(wsUrl);
		ws.binaryType = 'arraybuffer';
		
		ws.onopen = function() {
			console.log('Connected to WebSocket server');
			updateStatus('streaming', 'Connected to server');
			connectionStatusDiv.style.backgroundColor = '#c8e6c9';
			connectionStatusDiv.innerHTML = '<strong style="color: #388e3c;">Connected - Ready to Stream</strong>';
		};
		
		ws.onerror = function(err) {
			console.error('WebSocket error:', err);
			updateStatus('disconnected', 'WebSocket error');
			connectionStatusDiv.style.backgroundColor = '#ffcccb';
			connectionStatusDiv.innerHTML = '<strong style="color: #d32f2f;">Connection Failed</strong>';
		};
		
		ws.onclose = function() {
			console.log('Disconnected from WebSocket server');
			updateStatus('disconnected', 'Disconnected from server');
			connectionStatusDiv.style.backgroundColor = '#ffcccb';
			connectionStatusDiv.innerHTML = '<strong style="color: #d32f2f;">Disconnected</strong>';
			streaming = false;
			stopStreamButton.disabled = true;
		};
	}
	
	// Fetch auth token and connect automatically
	async function autoConnect() {
		try {
			connectionStatusDiv.innerHTML = '<strong>Fetching security token...</strong>';
			const response = await fetch('/auth');
			if (!response.ok) {
				throw new Error('Failed to get auth token');
			}
			const data = await response.json();
			authToken = data.token;
			
			connectionStatusDiv.innerHTML = '<strong>Connecting...</strong>';
			connectWebSocket(authToken);
		} catch (error) {
			console.error('Auth error:', error);
			connectionStatusDiv.style.backgroundColor = '#ffcccb';
			connectionStatusDiv.innerHTML = '<strong style="color: #d32f2f;">Auth Failed: ' + error.message + '</strong>';
		}
	}
	
	// Start auto-connect on page load
	autoConnect();
	
	function updateStatus(className, text) {
		statusDiv.className = className;
		statusDiv.textContent = text;
	}
	
	// Start camera
	startButton.addEventListener('click', async function() {
		try {
			stream = await navigator.mediaDevices.getUserMedia({
				video: { width: 320, height: 240 }
			});
			video.srcObject = stream;
			startButton.disabled = true;
			stopButton.disabled = false;
			startStreamButton.disabled = false;
			document.getElementById('fullscreenBtn').disabled = false;
			document.getElementById('pipBtn').disabled = false;
			updateStatus('connected', 'Camera started - ready to stream');
		} catch (err) {
			console.error('Error accessing camera:', err);
			updateStatus('disconnected', 'Error: ' + err.message);
		}
	});
	
	// Stop camera
	stopButton.addEventListener('click', function() {
		if (streaming) {
			stopStream();
		}
		if (stream) {
			stream.getTracks().forEach(track => track.stop());
			stream = null;
		}
		video.srcObject = null;
		startButton.disabled = false;
		stopButton.disabled = true;
		startStreamButton.disabled = true;
		document.getElementById('fullscreenBtn').disabled = true;
		document.getElementById('pipBtn').disabled = true;
		if (ws) {
			ws.close();
			ws = null;
		}
		updateStatus('disconnected', 'Camera stopped');
	});
	
	// Start streaming
	startStreamButton.addEventListener('click', function() {
		if (!ws || ws.readyState !== WebSocket.OPEN) {
			alert('WebSocket not connected');
			return;
		}
		
		streaming = true;
		frameCount = 0;
		byteCount = 0;
		startStreamButton.disabled = true;
		stopStreamButton.disabled = false;
		frameRateInput.disabled = true;
		updateStatus('streaming', 'Streaming...');
		
		const frameInterval = 1000 / parseInt(frameRateInput.value);
		
		streamInterval = setInterval(function() {
			if (!streaming || video.readyState !== video.HAVE_ENOUGH_DATA) return;
			
			// Draw video frame to canvas
			ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
			
			// Convert to blob (JPEG)
			canvas.toBlob(function(blob) {
				if (streaming && ws && ws.readyState === WebSocket.OPEN) {
					// Send binary JPEG data
					const reader = new FileReader();
					reader.onload = function(e) {
						ws.send(e.target.result);
						frameCount++;
						byteCount += blob.size;
						
						document.getElementById('frameCount').textContent = frameCount;
						document.getElementById('byteCount').textContent = (byteCount / 1024).toFixed(1);
						document.getElementById('avgSize').textContent = (byteCount / frameCount / 1024).toFixed(1);
					};
					reader.readAsArrayBuffer(blob);
				}
			}, 'image/jpeg', 0.7); // 70% JPEG quality
		}, frameInterval);
	});
	
	// Stop streaming
	stopStreamButton.addEventListener('click', stopStream);
	
	function stopStream() {
		streaming = false;
		if (streamInterval) {
			clearInterval(streamInterval);
			streamInterval = null;
		}
		startStreamButton.disabled = false;
		stopStreamButton.disabled = true;
		frameRateInput.disabled = false;
		updateStatus('connected', 'Connected (not streaming)');
	}
	
	// Fullscreen handler
	document.getElementById('fullscreenBtn').addEventListener('click', function() {
		if (video.requestFullscreen) {
			video.requestFullscreen();
		} else if (video.webkitRequestFullscreen) {
			video.webkitRequestFullscreen();
		} else if (video.mozRequestFullScreen) {
			video.mozRequestFullScreen();
		} else if (video.msRequestFullscreen) {
			video.msRequestFullscreen();
		}
	});
	
	// Picture-in-Picture handler
	document.getElementById('pipBtn').addEventListener('click', function() {
		if (document.pictureInPictureEnabled && video) {
			if (document.pictureInPictureElement) {
				document.exitPictureInPicture();
			} else {
				video.requestPictureInPicture().catch(err => {
					console.error('Error requesting picture-in-picture:', err);
				});
			}
		} else {
			alert('Picture-in-Picture is not supported in your browser');
		}
	});
	
	// Auto-connect on load
	window.addEventListener('load', function() {
		connectWebSocket();
	});
	
	// Cleanup on unload
	window.addEventListener('beforeunload', function() {
		stopStream();
		stopButton.click();
	});
	</script>
</body>
</html>
